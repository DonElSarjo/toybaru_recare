let statsFrom='', statsTo='';
async function loadStats() {
  const el=document.getElementById('statsContent');el.innerHTML=`<div class="meta">${t('app.loading')}</div>`;
  let url=`/api/db/stats?vin=${currentVin}`;
  if(statsFrom)url+=`&from_date=${statsFrom}`;
  if(statsTo)url+=`&to_date=${statsTo}`;
  const s=await(await fetch(url)).json();
  if(!s.total_trips){el.innerHTML=`<div class="meta">${t('trips.no_db')}</div>`;return}
  const lc=LC;
  let h='';

  // Time range selector
  h+=`<div class="card" style="margin-bottom:16px;display:flex;gap:12px;align-items:center;padding:10px 16px">
    <span class="meta">${t('import.from')}</span><input type="date" id="statsFrom" value="${statsFrom}" style="width:auto" onchange="statsFrom=this.value;loadStats()">
    <span class="meta">${t('import.to')}</span><input type="date" id="statsTo" value="${statsTo}" style="width:auto" onchange="statsTo=this.value;loadStats()">
    <button class="btn btn-sm" onclick="statsFrom='';statsTo='';loadStats()">${t('stats.overview')}</button>
    <span class="meta">${s.days_span} ${t('app.days')}, ${s.first_trip?.slice(0,10)} - ${s.last_trip?.slice(0,10)}</span>
  </div>`;

  // Top numbers
  h+=`<div class="grid4" style="margin-bottom:16px">`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.total_trips.toLocaleString(lc)}</div><div class="stat-label">${t('stats.total_trips')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.total_km.toLocaleString(lc)}</div><div class="stat-label">${tu('stats.total_km')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.total_hours.toLocaleString(lc)}</div><div class="stat-label">${t('stats.total_hours')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.km_per_day}</div><div class="stat-label">${distLabel()}/${t('app.days')}</div></div></div>`;

  // Scores
  h+=`<div class="grid4" style="margin-bottom:16px">`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.avg_score}</div><div class="stat-label">${t('stats.avg_score')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.avg_score_accel}</div><div class="stat-label">${t('trips.score_accel')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.avg_score_braking}</div><div class="stat-label">${t('trips.score_braking')}</div></div>`;
  h+=`<div class="card stat-box"><div class="stat-num">${s.avg_speed} / ${s.max_speed}</div><div class="stat-label">${speedUnit()} &#8709; / max</div></div></div>`;

  // Efficiency bar
  h+=`<div class="card" style="margin-bottom:16px"><div class="section-title">${t('stats.efficiency_all')}</div><div class="grid3">`;
  h+=`<div class="stat-box"><div class="stat-num" style="color:var(--green)">${s.eco_pct}%</div><div class="stat-label">${t('stats.eco_share')}</div></div>`;
  h+=`<div class="stat-box"><div class="stat-num" style="color:var(--blue)">${s.reku_pct}%</div><div class="stat-label">${t('stats.reku_share')}</div></div>`;
  h+=`<div class="stat-box"><div class="stat-num" style="color:var(--red)">${s.power_pct}%</div><div class="stat-label">${t('stats.power_share')}</div></div></div>`;
  h+=sbarHtml({eco:s.eco_pct,reku:s.reku_pct,power:s.power_pct})+`</div>`;

  // Monthly km + score chart
  if(s.monthly?.length>1){
    const maxKm=Math.max(...s.monthly.map(m=>m.km));
    h+=`<div class="card" style="margin-bottom:16px"><div class="section-title">${tu('stats.km_per_month')}</div>`;
    h+=`<div class="bar-chart">`;
    for(const m of s.monthly){
      const ht=Math.max(4,Math.round(m.km/maxKm*72));
      const ml=m.month.split('-');const mn=new Date(m.month+'-15').toLocaleString(LC,{month:'short'});
      h+=`<div class="bar-col" title="${m.month}: ${m.km} ${distLabel()}, Score ${m.score}"><div class="bar" style="height:${ht}px"></div><div class="bar-label">${mn}</div><div class="bar-label">${ml[0].slice(2)}</div></div>`;
    }
    h+=`</div>`;
    // Score trend line under the bars
    h+=`<div style="display:flex;gap:3px;margin-top:4px">`;
    for(const m of s.monthly){h+=`<div class="bar-col"><div class="bar-label" style="color:${m.score>=80?'var(--green)':m.score>=60?'var(--yellow)':'var(--red)'}">${m.score}</div></div>`}
    h+=`</div><div class="meta" style="text-align:right">Score &#8593;</div></div>`;
  }

  // Two columns: weekday + time of day
  h+=`<div class="grid2" style="margin-bottom:16px">`;

  // Weekday
  if(s.weekday?.length){
    const maxD=Math.max(...s.weekday.map(d=>d.trips));
    h+=`<div class="card"><div class="section-title">${t('stats.trips_by_weekday')}</div><div class="bar-chart" style="height:60px">`;
    for(const d of s.weekday){const ht=Math.max(4,Math.round(d.trips/maxD*52));h+=`<div class="bar-col"><div class="bar" style="height:${ht}px" title="${d.trips} ${t('nav.trips')}, ${d.km} ${distLabel()}"></div><div class="bar-label">${d.day}</div><div class="bar-label">${d.trips}</div></div>`}
    h+=`</div></div>`;
  }

  // Hourly
  if(s.hourly?.length){
    const maxH=Math.max(...s.hourly.map(h2=>h2.trips));
    h+=`<div class="card"><div class="section-title">${t('stats.time_of_day')}</div><div class="bar-chart" style="height:60px">`;
    for(let hr=0;hr<24;hr++){const d=s.hourly.find(x=>x.hour===hr);const v=d?d.trips:0;const ht=Math.max(1,Math.round(v/maxH*52));
      h+=`<div class="bar-col" title="${hr}:00 - ${v} ${t('nav.trips')}"><div class="bar-label">${v||''}</div><div class="bar" style="height:${ht}px;${hr>=22||hr<6?'background:var(--muted)':hr>=6&&hr<12?'background:var(--yellow)':hr>=12&&hr<18?'background:var(--green)':'background:var(--blue)'}"></div></div>`}
    h+=`</div><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span></div></div>`;
  }
  h+=`</div>`;

  // Speed categories + score distribution
  h+=`<div class="grid2" style="margin-bottom:16px">`;
  const sc=s.speed_cats;
  const totalCat=sc.city_trips+sc.rural_trips+sc.highway_trips||1;
  h+=`<div class="card"><div class="section-title">${t('stats.speed_categories')}</div>`;
  h+=`<div class="row"><span class="k">${tu('stats.city')}</span><span>${sc.city_trips} (${Math.round(sc.city_trips/totalCat*100)}%) &middot; ${sc.city_km} ${distLabel()}</span></div>`;
  h+=`<div class="row"><span class="k">${tu('stats.rural')}</span><span>${sc.rural_trips} (${Math.round(sc.rural_trips/totalCat*100)}%) &middot; ${sc.rural_km} ${distLabel()}</span></div>`;
  h+=`<div class="row"><span class="k">${tu('stats.highway')}</span><span>${sc.highway_trips} (${Math.round(sc.highway_trips/totalCat*100)}%) &middot; ${sc.highway_km} ${distLabel()}</span></div></div>`;

  // Score distribution
  if(s.score_dist?.length){
    const maxSd=Math.max(...s.score_dist.map(d=>d.count));
    h+=`<div class="card"><div class="section-title">${t('stats.score_distribution')}</div><div class="bar-chart" style="height:60px">`;
    for(const d of s.score_dist){const ht=Math.max(4,Math.round(d.count/maxSd*52));const b=parseInt(d.bucket);
      h+=`<div class="bar-col"><div class="bar" style="height:${ht}px;background:${b>=80?'var(--green)':b>=60?'var(--yellow)':'var(--red)'}"></div><div class="bar-label">${d.count}</div><div class="bar-label">${d.bucket}</div></div>`}
    h+=`</div></div>`;
  }
  h+=`</div>`;

  // Averages + misc
  h+=`<div class="grid2" style="margin-bottom:16px">`;
  h+=`<div class="card"><div class="section-title">${t('stats.averages')}</div>`;
  h+=`<div class="row"><span class="k">${t('stats.avg_trip_length')}</span><span>${s.avg_trip_km} ${distLabel()}</span></div>`;
  h+=`<div class="row"><span class="k">${t('stats.avg_trip_duration')}</span><span>${s.avg_trip_min} min</span></div>`;
  h+=`<div class="row"><span class="k">${t('stats.trips_per_day')}</span><span>${s.trips_per_day}</span></div>`;
  h+=`<div class="row"><span class="k">${t('stats.night_trips')}</span><span>${s.night_trips} (${s.night_pct}%)</span></div>`;
  h+=`<div class="row"><span class="k">${t('app.idle_time')}</span><span>${s.idle_hours} h</span></div>`;
  h+=`<div class="row"><span class="k">${t('app.overspeed')}</span><span>${s.overspeed_km} ${distLabel()}</span></div></div>`;

  // Records
  h+=`<div class="card"><div class="section-title">${t('stats.records')}</div>`;
  const rec=s.records||{};
  if(rec.longest_trip)h+=`<div class="row"><span class="k">${t('stats.longest_trip')}</span><span>${fmtKm(rec.longest_trip.value)} ${distLabel()} <span class="meta">${rec.longest_trip.date?.slice(0,10)}</span></span></div>`;
  if(rec.top_speed)h+=`<div class="row"><span class="k">${tu('stats.max_speed')}</span><span>${rec.top_speed.value} ${speedUnit()} <span class="meta">${rec.top_speed.date?.slice(0,10)}</span></span></div>`;
  if(rec.fastest_avg)h+=`<div class="row"><span class="k">${t('stats.fastest_avg')}</span><span>${Math.round(rec.fastest_avg.value)} ${speedUnit()} <span class="meta">${rec.fastest_avg.date?.slice(0,10)}</span></span></div>`;
  if(rec.best_score)h+=`<div class="row"><span class="k">${t('stats.best_score')}</span><span>${rec.best_score.value} <span class="meta">${rec.best_score.date?.slice(0,10)}</span></span></div>`;
  if(rec.best_reku)h+=`<div class="row"><span class="k">${t('stats.best_reku')}</span><span>${rec.best_reku.value}% <span class="meta">${rec.best_reku.date?.slice(0,10)}</span></span></div>`;
  if(s.best_day)h+=`<div class="row"><span class="k">${tu('stats.most_km_day')}</span><span>${s.best_day.km} ${distLabel()} (${s.best_day.trips} ${t('nav.trips').toLowerCase()}) <span class="meta">${s.best_day.date}</span></span></div>`;
  h+=`</div></div>`;

  if(DEBUG&&s.est_avg_kwh_100km){h+=`<div class="card"><div class="stat-num">${s.est_avg_kwh_100km} <span style="font-size:14px;color:var(--muted)">${distPer100Label()}</span></div><div class="stat-label">${t('stats.est_consumption')}</div></div>`}
  el.innerHTML=h;
}

// --- Import ---
async function loadDbInfo(){const c=await(await fetch('/api/db/count')).json();document.getElementById('importDbInfo').textContent=t('import.db_info').replace('{count}',c.count)}

function startImport() {
  const from=document.getElementById('importFrom').value,to=document.getElementById('importTo').value;
  const btn=document.getElementById('importBtn'),prog=document.getElementById('importProgress'),fill=document.getElementById('importFill'),st=document.getElementById('importStatus'),pctEl=document.getElementById('importPct'),log=document.getElementById('importLog');
  btn.disabled=true;prog.style.display='block';log.textContent='';log.classList.remove('open');
  const es=new EventSource(`/api/import/${currentVin}?from_date=${from}&to_date=${to}`);
  es.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.type==='start'){
      log.textContent+=`[${new Date().toLocaleTimeString()}] Import gestartet: ${d.from} bis ${d.to}\n`;
    } else if(d.type==='progress'){
      fill.style.width=d.pct+'%';pctEl.textContent=d.pct+'%';
      st.textContent=t('import.fetched').replace('{fetched}',d.fetched).replace('{total}',d.total).replace('{new}',d.new).replace('{updated}',d.updated);
      const ts=new Date().toLocaleTimeString();
      let line=`[${ts}] ${d.pct}% | ${d.fetched}/${d.total} | +${d.new} new, ~${d.updated} upd`;
      if(d.trips?.length){
        const details=d.trips.map(tr=>`  ${tr.date} ${tr.km}${distLabel()} ${tr.spd}${speedUnit()} score:${tr.score??'?'}`).join('\n');
        line+='\n'+details;
      }
      log.textContent+=line+'\n';
      log.scrollTop=log.scrollHeight;
    } else if(d.type==='error'){
      st.textContent=t('import.error')+': '+d.message;
      log.textContent+=`[${new Date().toLocaleTimeString()}] ERROR: ${d.message}\n`;
      es.close();btn.disabled=false;
    } else if(d.type==='done'){
      fill.style.width='100%';pctEl.textContent='100%';
      st.textContent=t('import.done').replace('{fetched}',d.fetched).replace('{new}',d.new).replace('{updated}',d.updated).replace('{total}',d.db_total);
      log.textContent+=`[${new Date().toLocaleTimeString()}] Done! ${d.fetched} fetched, ${d.new} new, ${d.updated} updated. DB: ${d.db_total} trips.\n`;
      es.close();btn.disabled=false;loadDbInfo();
    }
  };
  es.onerror=()=>{st.textContent=t('app.error');log.textContent+=`[${new Date().toLocaleTimeString()}] Connection lost\n`;es.close();btn.disabled=false};
}

function toggleImportLog() {
  const log=document.getElementById('importLog');
  log.classList.toggle('open');
  updateLogBtn();
}
function updateLogBtn() {
  const log=document.getElementById('importLog');
  const btn=document.getElementById('importLogBtn');
  btn.textContent = log.classList.contains('open') ? t('import.log_hide') : t('import.log_show');
}

async function reimportJson() {
  const file=document.getElementById('reimportFile').files[0];
  const st=document.getElementById('reimportStatus');
  if(!file){st.textContent='No file selected';return}
  st.textContent=t('app.loading');
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    const trips=Array.isArray(data)?data:data.trips||[];
    const res=await(await fetch('/api/reimport',{method:'POST',headers:_postHeaders(),body:JSON.stringify({trips})})).json();
    if(res.error)st.textContent=t('app.error')+': '+res.error;
    else st.textContent=`${res.new} new, ${res.updated} updated (${res.total} total)`;
    loadDbInfo();
  }catch(e){st.textContent=t('app.error')+': '+e.message}
}

// --- Canvas Route Map ---
class RouteMap {
  constructor(canvas,route,behaviours){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');
    this.route=route.filter(p=>p.lat&&p.lon);this.behaviours=(behaviours||[]).filter(b=>b.lat&&b.lon);
    this.tileCache={};this.dpr=window.devicePixelRatio||1;
    const rect=canvas.getBoundingClientRect();canvas.width=rect.width*this.dpr;canvas.height=rect.height*this.dpr;
    this.W=rect.width;this.H=rect.height;
    if(!this.route.length){this.ctx.fillStyle='#161b22';this.ctx.fillRect(0,0,canvas.width,canvas.height);return}
    const lats=this.route.map(p=>p.lat),lons=this.route.map(p=>p.lon);
    this.minLat=Math.min(...lats);this.maxLat=Math.max(...lats);this.minLon=Math.min(...lons);this.maxLon=Math.max(...lons);
    this.zoom=this._fitZoom();
    const cp=this._project((this.minLat+this.maxLat)/2,(this.minLon+this.maxLon)/2);
    this.ox=cp.x-this.W/2;this.oy=cp.y-this.H/2;
    this._dragging=false;
    // Tooltip
    this._tooltip=document.createElement('div');
    this._tooltip.style.cssText='position:absolute;display:none;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px 10px;font-size:12px;color:#c9d1d9;pointer-events:none;z-index:20;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4)';
    canvas.parentElement.style.position='relative';
    canvas.parentElement.appendChild(this._tooltip);

    canvas.addEventListener('wheel',e=>{e.preventDefault();this._onWheel(e)},{passive:false});
    canvas.addEventListener('mousedown',e=>{this._dragging=true;this._lastX=e.clientX;this._lastY=e.clientY;canvas.style.cursor='grabbing';this._tooltip.style.display='none'});
    canvas.addEventListener('mousemove',e=>{
      if(this._dragging){this.ox-=(e.clientX-this._lastX);this.oy-=(e.clientY-this._lastY);this._lastX=e.clientX;this._lastY=e.clientY;this.render();return}
      const rect=this.canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      this._showTooltip(mx,my);
    });
    window.addEventListener('mouseup',()=>{if(this._dragging){this._dragging=false;canvas.style.cursor='grab'}});
    canvas.addEventListener('mouseleave',()=>{this._tooltip.style.display='none'});
    canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){this._dragging=true;this._lastX=e.touches[0].clientX;this._lastY=e.touches[0].clientY}});
    canvas.addEventListener('touchmove',e=>{if(!this._dragging||e.touches.length!==1)return;e.preventDefault();this.ox-=(e.touches[0].clientX-this._lastX);this.oy-=(e.touches[0].clientY-this._lastY);this._lastX=e.touches[0].clientX;this._lastY=e.touches[0].clientY;this.render()},{passive:false});
    canvas.addEventListener('touchend',()=>{this._dragging=false});
    this.render();
  }
  _project(lat,lon){const n=Math.pow(2,this.zoom);const x=((lon+180)/360)*n*256;const r=lat*Math.PI/180;const y=(1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n*256;return{x,y}}
  _toCanvas(wp){return{x:(wp.x-this.ox)*this.dpr,y:(wp.y-this.oy)*this.dpr}}
  _fitZoom(){for(let z=18;z>=1;z--){const n=Math.pow(2,z);const p1=this._pAt(this.minLat,this.minLon,n),p2=this._pAt(this.maxLat,this.maxLon,n);if(Math.abs(p2.x-p1.x)<this.W*.85&&Math.abs(p2.y-p1.y)<this.H*.85)return z}return 1}
  _pAt(lat,lon,n){const x=((lon+180)/360)*n*256;const r=lat*Math.PI/180;return{x,y:(1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n*256}}
  _onWheel(e){const rect=this.canvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const wx=this.ox+mx,wy=this.oy+my;const oz=this.zoom;this.zoom=Math.max(1,Math.min(18,this.zoom+(-e.deltaY*.002)));if(this.zoom===oz)return;const s=Math.pow(2,this.zoom-oz);this.ox=wx*s-mx;this.oy=wy*s-my;this.render()}
  fitRoute(){this.zoom=this._fitZoom();const cp=this._project((this.minLat+this.maxLat)/2,(this.minLon+this.maxLon)/2);this.ox=cp.x-this.W/2;this.oy=cp.y-this.H/2;this.render()}

  _showTooltip(mx,my){
    const modeNames={0:t('efficiency.reku'),1:t('efficiency.eco'),2:t('efficiency.power')};
    const modeColors={0:'#58a6ff',1:'#3fb950',2:'#f85149'};
    let best=null, bestDist=Infinity;

    // Check behaviours first (higher priority, bigger hit area)
    for(const b of this.behaviours){
      const wp=this._project(b.lat,b.lon);
      const sx=(wp.x-this.ox), sy=(wp.y-this.oy); // screen coords (non-dpr)
      const dx=sx-mx, dy=sy-my;
      const d=dx*dx+dy*dy;
      if(d<600&&d<bestDist){
        bestDist=d;
        const typ=b.type==='B'?t('trips.braking'):t('trips.acceleration');
        const rating=b.good?t('trips.good'):t('trips.harsh');
        const time=b.ts?new Date(b.ts).toLocaleTimeString(LC):'';
        const slope=b.context?.slope?` | ${t('app.slope')}: ${(b.context.slope*100).toFixed(1)}%`:'';
        best=`<span style="color:${b.good?'#3fb950':'#f85149'}">&#9679;</span> <b>${typ}</b> ${rating}${time?' | '+time:''}${slope}`;
      }
    }

    // Check route points (sample every Nth for performance)
    if(!best){
      const step=Math.max(1,Math.floor(this.route.length/500));
      for(let i=0;i<this.route.length;i+=step){
        const p=this.route[i];
        const wp=this._project(p.lat,p.lon);
        const sx=(wp.x-this.ox), sy=(wp.y-this.oy);
        const dx=sx-mx, dy=sy-my;
        const d=dx*dx+dy*dy;
        if(d<300&&d<bestDist){
          bestDist=d;
          const mode=modeNames[p.mode]||'?';
          const color=modeColors[p.mode]||'#8b949e';
          const os=p.overspeed?` | <span style="color:#f85149">${t('app.overspeed_long')}</span>`:'';
          const hw=p.highway?` | ${t('app.highway')}`:'';
          const modeDesc={0:t('app.regen_desc'),1:t('app.eco_drive_desc'),2:t('app.power_drive_desc')};
          best=`<span style="color:${color}">&#9679;</span> <b>${mode}</b>${os}${hw}<br><span style="color:#8b949e">${modeDesc[p.mode]||''}</span><br><span style="color:#8b949e">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</span>`;
        }
      }
    }

    if(best){
      this._tooltip.innerHTML=best;
      this._tooltip.style.display='block';
      let tx=mx+14, ty=my-36;
      if(ty<4)ty=my+16;
      if(tx+200>this.W)tx=mx-210;
      this._tooltip.style.left=tx+'px';
      this._tooltip.style.top=ty+'px';
    }else{
      this._tooltip.style.display='none';
    }
  }

  _loadTile(z,tx,ty){const k=`${z}/${tx}/${ty}`;if(this.tileCache[k])return this.tileCache[k];const img=new Image();img.crossOrigin='anonymous';img.src=`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`;img.onload=()=>this.render();this.tileCache[k]=img;return img}
  render(){
    const ctx=this.ctx,dpr=this.dpr;ctx.fillStyle='#161b22';ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
    const tz=Math.round(this.zoom),tN=Math.pow(2,tz),rN=Math.pow(2,this.zoom),sc=rN/tN,ts2=256*sc;
    const tOx=this.ox/sc,tOy=this.oy/sc;
    const sx=Math.floor(tOx/256),sy=Math.floor(tOy/256),ex=Math.ceil((tOx+this.W/sc)/256),ey=Math.ceil((tOy+this.H/sc)/256);
    for(let tx=sx;tx<=ex;tx++)for(let ty=sy;ty<=ey;ty++){if(tx<0||ty<0||tx>=tN||ty>=tN)continue;const img=this._loadTile(tz,tx,ty);if(img.complete&&img.naturalWidth)ctx.drawImage(img,(tx*ts2-this.ox)*dpr,(ty*ts2-this.oy)*dpr,ts2*dpr,ts2*dpr)}
    if(this.route.length<2)return;
    const mc={0:'#58a6ff',1:'#3fb950',2:'#f85149'};ctx.lineWidth=3*dpr;ctx.lineCap='round';ctx.lineJoin='round';
    let pm=this.route[0].mode;ctx.beginPath();let f=this._toCanvas(this._project(this.route[0].lat,this.route[0].lon));ctx.moveTo(f.x,f.y);
    for(let i=1;i<this.route.length;i++){const p=this.route[i],cp2=this._toCanvas(this._project(p.lat,p.lon));if(p.mode!==pm){ctx.strokeStyle=mc[pm]||'#8b949e';ctx.globalAlpha=.9;ctx.stroke();ctx.beginPath();ctx.moveTo(cp2.x,cp2.y);pm=p.mode}ctx.lineTo(cp2.x,cp2.y)}
    ctx.strokeStyle=mc[pm]||'#8b949e';ctx.globalAlpha=.9;ctx.stroke();ctx.globalAlpha=1;
    for(const b of this.behaviours){const cp2=this._toCanvas(this._project(b.lat,b.lon));ctx.beginPath();ctx.arc(cp2.x,cp2.y,5*dpr,0,Math.PI*2);ctx.fillStyle=b.good?'#3fb950':(b.type==='B'?'#f85149':'#d29922');ctx.fill();ctx.strokeStyle='#0d1117';ctx.lineWidth=1.5*dpr;ctx.stroke()}
    const sp=this._toCanvas(this._project(this.route[0].lat,this.route[0].lon)),ep=this._toCanvas(this._project(this.route[this.route.length-1].lat,this.route[this.route.length-1].lon));
    for(const[pt,col] of[[sp,'#3fb950'],[ep,'#f85149']]){ctx.beginPath();ctx.arc(pt.x,pt.y,7*dpr,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#0d1117';ctx.lineWidth=2*dpr;ctx.stroke()}
  }
}

// --- Init ---
async function init() {
  const today=new Date().toISOString().slice(0,10),month=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  document.getElementById('tripsFrom').value=month;document.getElementById('tripsTo').value=today;document.getElementById('importTo').value=today;
  availableLangs = await (await fetch('/api/languages')).json();
  // If stored lang not available, fall back
  if (!availableLangs.find(l => l.code === lang)) lang = availableLangs[0]?.code || 'en';
  initTheme();
  await loadI18n();
  await loadBrands();
  await checkAuth();
}
init();
