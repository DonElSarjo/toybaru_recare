<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toybaru ReCare</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/favicon-180.png">
<link rel="shortcut icon" href="/favicon.ico">
<style>
/* ========================================================================
   Toybaru ReCare design tokens — GitHub Primer-adjacent dark default with
   a light override, subtle brand accent tints (subaru/toyota/lexus).
   Tokens, scale and rules mirror the Toybaru ReCare Design System exactly.
   ======================================================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  /* Surfaces */
  --bg:      #0d1117;
  --surface: #161b22;
  --elev:    #1c232e;
  --border:  #30363d;
  --hover:   #1c2533;
  --row-sep: #1c2028;
  --code-bg: #0a0c10;

  /* Text */
  --text:  #c9d1d9;
  --muted: #8b949e;
  --faint: #484f58;

  /* Brand / semantic */
  --primary:     #58a6ff;
  --primary-ink: #ffffff;
  --green:       #3fb950;
  --yellow:      #d29922;
  --red:         #f85149;
  --blue:        #58a6ff;

  /* Chips */
  --chip-green-bg:    #1a3a2a;
  --chip-yellow-bg:   #2a2a1a;
  --chip-red-bg:      #2a1a1a;
  --chip-ok-border:   #1a4731;
  --chip-warn-border: #5c1a1a;

  /* Legacy aliases so older markup/rendering JS keeps working */
  --accent: var(--primary);
  --primary-hover: var(--primary);
  --link: var(--primary);
  --shadow: rgba(0,0,0,.3);
  --overlay-bg: rgba(0,0,0,.5);
  --log-bg: var(--code-bg);
  --input-bg: var(--surface);
  --table-header: var(--surface);
  --table-hover: var(--hover);
  --topbar-bg: var(--surface);
  --topbar-border: var(--border);
  --topbar-text: var(--text);
  --tab-active-bg: var(--surface);
  --tab-active-border: var(--primary);
  --tab-text: var(--muted);
  --tab-active-text: var(--text);
  --error: var(--red);
  --success: var(--green);
}

/* Light theme override */
body.light {
  --bg:      #f6f8fa;
  --surface: #ffffff;
  --elev:    #ffffff;
  --border:  #d0d7de;
  --hover:   #eef2f7;
  --row-sep: #e6ebf1;
  --code-bg: #f6f8fa;

  --text:  #1f2328;
  --muted: #656d76;
  --faint: #afb8c1;

  --primary: #0969da;
  --primary-ink: #ffffff;
  --green:   #1a7f37;
  --yellow:  #9a6700;
  --red:     #cf222e;
  --blue:    #0969da;

  --chip-green-bg:    #dafbe1;
  --chip-yellow-bg:   #fff8c5;
  --chip-red-bg:      #ffebe9;
  --chip-ok-border:   #aceebb;
  --chip-warn-border: #ff8182;

  --shadow: rgba(31,35,40,.04);
  --overlay-bg: rgba(0,0,0,.4);
}

/* Brand accent variants (primary colour only — no full palette swap) */
body.subaru       { --primary: #0053a0; --blue: #0053a0; --brand-accent: #0053a0; }
body.subaru.light { --primary: #0053a0; --blue: #0053a0; }
body.dark.subaru, body:not(.light).subaru { --primary: #4d9be6; --blue: #4d9be6; --brand-accent: #4d9be6; }
body.toyota       { --primary: #eb0a1e; --red: #d70010; --blue: #6e7d8c; --brand-accent: #eb0a1e; }
body.toyota.light { --primary: #eb0a1e; --red: #d70010; }
body.dark.toyota, body:not(.light).toyota { --primary: #ff5a4a; --brand-accent: #ff5a4a; }
body.lexus       { --primary: #1c1c1e; --blue: #1c1c1e; --brand-accent: #1c1c1e; }
body.lexus.light { --primary: #1c1c1e; --blue: #1c1c1e; }
body.dark.lexus, body:not(.light).lexus { --primary: #c8a97a; --brand-accent: #c8a97a; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background .2s, color .2s;
}

/* ---------- Shell & scrollable content (one scroll per tab) ----------- */
.shell { display: flex; flex-direction: column; height: 100vh; }
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface); color: var(--text);
}
.topbar h1 {
  font-size: 15px; font-weight: 600; margin-right: auto;
  display: flex; align-items: center; gap: 10px;
}
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  flex-shrink: 0;
  background: var(--surface);
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s;
  margin-bottom: -1px;
  font-family: inherit;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--primary); }
.page {
  display: none;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px;
  width: 100%;
}
.page.active { display: flex; flex-direction: column; gap: 12px; }

/* ---------- Inputs ---------------------------------------------------- */
input, select, textarea {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  width: 100%;
}
input[type=date] { color-scheme: light dark; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

/* ---------- Buttons --------------------------------------------------- */
.btn {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.btn:hover:not(:disabled) { border-color: var(--muted); background: var(--hover); }
.btn:disabled { opacity: .4; cursor: default; }
.btn-primary {
  background: var(--primary); color: var(--primary-ink);
  border-color: var(--primary);
}
.btn-primary:hover:not(:disabled) { opacity: .9; border-color: var(--primary); background: var(--primary); }
.btn-destructive {
  color: var(--red);
  border-color: var(--chip-warn-border);
  background: var(--chip-red-bg);
}
.btn-destructive:hover:not(:disabled) { background: color-mix(in srgb, var(--red) 18%, var(--surface)); border-color: var(--red); }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-ghost { background: transparent; }

/* ---------- Typography helpers ---------------------------------------- */
.meta { color: var(--muted); font-size: 12px; }
.error { color: var(--red); font-size: 13px; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
h1, h2, h3 { color: var(--text); font-weight: 600; }

.row {
  display: flex; justify-content: space-between;
  padding: 4px 0; font-size: 13px;
}
.row .k { color: var(--muted); }
.section-title {
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .04em;
  display: flex; align-items: center; gap: 8px;
}

/* ---------- Panels & grids ------------------------------------------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.card + .card { margin-top: 0; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

/* ---------- Tags & badges -------------------------------------------- */
.tag {
  font-size: 11px; padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid;
  display: inline-block;
  font-weight: 500;
}
.tag-ok   { color: var(--green); border-color: var(--chip-ok-border);   background: var(--chip-green-bg); }
.tag-warn { color: var(--red);   border-color: var(--chip-warn-border); background: var(--chip-red-bg); }
.cap-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid color-mix(in srgb, var(--primary) 40%, transparent);
  color: var(--primary);
  background: color-mix(in srgb, var(--primary) 10%, transparent);
  white-space: nowrap;
}

/* ---------- Tables --------------------------------------------------- */
table { width: 100%; font-size: 13px; border-collapse: separate; border-spacing: 0; }
th {
  text-align: left; color: var(--muted); font-weight: 500;
  padding: 10px 14px; font-size: 11px;
  text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
  z-index: 2;
}
td { padding: 12px 14px; border-bottom: 1px solid var(--row-sep); transition: background .1s; }
.clickable-row { cursor: pointer; }
.clickable-row:hover td { background: var(--hover); }
.num { text-align: right; font-variant-numeric: tabular-nums; }
/* Outer wrapper — no inner scroll; parent .page handles scrolling */
.trips-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

/* ---------- Scores & trip bits --------------------------------------- */
.trip-score {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.score-good { background: var(--chip-green-bg);  color: var(--green); }
.score-mid  { background: var(--chip-yellow-bg); color: var(--yellow); }
.score-bad  { background: var(--chip-red-bg);    color: var(--red); }
.trip-pct { font-size: 12px; color: var(--muted); }
.trip-pct b { color: var(--text); font-weight: 500; }
.trip-date { font-weight: 500; white-space: nowrap; }

/* ---------- Battery & bars ------------------------------------------- */
.bat-pct {
  font-size: 28px; font-weight: 600; line-height: 1.2;
  font-variant-numeric: tabular-nums;
}
.bat-bar {
  width: 100%; height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin: 8px 0 12px;
  overflow: hidden;
}
.bat-fill { height: 100%; border-radius: 4px; transition: width .4s; background: var(--primary); }
.sbar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--border); }
.sbar-eco   { background: var(--green); }
.sbar-reku  { background: var(--blue); }
.sbar-power { background: var(--red); }
.sbar-legend { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-top: 6px; }
.sbar-legend span::before {
  content: ''; display: inline-block;
  width: 8px; height: 8px; border-radius: 2px;
  margin-right: 4px; vertical-align: middle;
}
.leg-eco::before   { background: var(--green); }
.leg-reku::before  { background: var(--blue); }
.leg-power::before { background: var(--red); }

/* ---------- Stats ---------------------------------------------------- */
.stat-num {
  font-size: 24px; font-weight: 600; line-height: 1.2;
  font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stat-box { padding: 12px; }

/* ---------- Vehicle hero --------------------------------------------- */
.vehicle-hero { display: flex; align-items: center; gap: 20px; padding: 16px; }
.vehicle-hero img {
  max-width: 200px; max-height: 140px;
  object-fit: contain;
  border-radius: 12px;
}
.vehicle-hero-info { flex: 1; }
.vehicle-hero-name { font-size: 20px; font-weight: 600; color: var(--text); }
.vehicle-hero-detail { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ---------- Tooltip -------------------------------------------------- */
.tip { position: relative; cursor: help; border-bottom: 1px dotted var(--muted); }
.tip .tip-text {
  display: none; position: absolute;
  bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px; font-size: 12px; color: var(--text); width: 240px;
  z-index: 50; line-height: 1.4; font-weight: 400; white-space: normal;
  box-shadow: 0 2px 8px var(--shadow);
}
.tip:hover .tip-text { display: block; }

/* ---------- Progress ------------------------------------------------- */
.progress-bar {
  width: 100%; height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .3s; }

/* ---------- Log area (inline scroll, bounded) ------------------------ */
.log-area {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 11px;
  padding: 8px 12px;
  max-height: 240px;
  overflow-y: auto;
  white-space: pre-wrap;
  color: var(--muted);
  display: none;
  margin-top: 8px;
}
.log-area.open { display: block; }

/* ---------- Overlay modal ------------------------------------------- */
.overlay {
  display: none; position: fixed; inset: 0;
  background: var(--overlay-bg);
  z-index: 100;
}
.overlay.open { display: flex; align-items: center; justify-content: center; }
.overlay-wrap { position: relative; width: 90%; max-width: 900px; }
.overlay-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-height: 85vh; overflow-y: auto;
  padding: 24px;
  box-shadow: 0 2px 8px var(--shadow);
}
.overlay-close {
  position: absolute; top: -14px; right: -14px;
  width: 28px; height: 28px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted);
  font-size: 16px; line-height: 26px; text-align: center;
  cursor: pointer;
  border-radius: 50%;
  padding: 0;
  z-index: 110;
}
.overlay-close:hover { color: var(--text); border-color: var(--muted); background: var(--border); }

/* ---------- Bar chart ------------------------------------------------ */
.bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin: 8px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.bar-col .bar { background: var(--primary); border-radius: 2px 2px 0 0; width: 100%; min-height: 1px; transition: height .3s; }
.bar-col .bar-label { font-size: 9px; color: var(--muted); }

/* ---------- Login ---------------------------------------------------- */
.login-wrap { display: flex; align-items: center; justify-content: center; height: 100vh; }
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  width: 360px;
}
.login-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.login-card p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.login-card label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
.login-card .error { margin-top: 12px; }

/* ---------- Small UI bits ------------------------------------------- */
.lang-select, .sync-select {
  background: transparent; color: var(--text);
  border: 1px solid var(--border);
  padding: 3px 8px; border-radius: 6px;
  font-size: 12px;
  width: auto;
}
.theme-toggle {
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  padding: 3px 8px;
  color: var(--text);
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 28px; height: 28px;
  font-family: inherit;
}
.theme-toggle:hover { border-color: var(--muted); background: var(--hover); }

/* Brand dot next to topbar title */
.brand-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--brand-accent, var(--primary));
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand-accent, var(--primary)) 25%, transparent);
}

/* ---------- Scrollbar styling --------------------------------------- */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
*::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ---------- Responsive ---------------------------------------------- */
@media (max-width: 960px) {
  .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
  .topbar { flex-wrap: wrap; padding: 10px 16px; gap: 8px; }
  .tabs { padding: 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .page { padding: 16px; }
  .overlay-wrap { width: 95%; max-width: none; }
}
@media (max-width: 640px) {
  .vehicle-hero { flex-direction: column; align-items: flex-start; gap: 12px; padding: 12px; }
  .vehicle-hero img { max-width: 100%; max-height: 160px; }
  .bat-pct { font-size: 24px; }
  .stat-num { font-size: 20px; }
  iframe { height: 180px !important; }
  .topbar h1 { font-size: 14px; }
}

/* ---------- Density (opt-in compact mode) --------------------------- */
body.dense .card { padding: 12px; }
body.dense .row { padding: 3px 0; font-size: 12px; }
body.dense .page { gap: 10px !important; padding: 16px; }
body.dense .vehicle-hero { padding: 10px; gap: 14px; }
body.dense .vehicle-hero img { max-width: 160px; max-height: 110px; }
body.dense .stat-num { font-size: 20px; }
body.dense .bat-pct { font-size: 24px; }

/* =======================================================================
   Kit components (ported from /tmp/toybaru_design/ui_kits/dashboard/styles.css)
   ======================================================================= */

/* Vehicle hero */
.tb-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.tb-hero-head {
  display: flex; justify-content: space-between; align-items: start;
  gap: 12px;
  padding-bottom: 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.tb-hero-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.tb-hero-model { font-size: 22px; font-weight: 600; margin-top: 2px; line-height: 1.15; }
.tb-hero-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

.tb-car-stage {
  position: relative;
  min-height: 460px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 0 16px;
}
.tb-car-stage.compact { min-width: 0; min-height: 520px; padding: 0; }
.tb-car-svg { max-height: 500px; width: auto; max-width: 260px; display: block; }

/* Hero body: three equal columns — car / map / features. Dividers live in the
   gap as absolutely-positioned pseudo-elements so every column keeps a
   symmetrical content area (no asymmetric padding/border that would push its
   centred content sideways). */
.tb-hero-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
  gap: 48px;
  align-items: stretch;
  margin: 4px 0 10px;
  position: relative;
}
.tb-hero-body > * { position: relative; min-width: 0; }
.tb-hero-body > *:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  right: -24px;
  width: 1px;
  background: var(--border);
}
.tb-hero-map {
  display: flex; flex-direction: column; gap: 6px;
}
.tb-hero-map iframe { width: 100%; flex: 1 1 auto; min-height: 240px; border-radius: 6px; border: 1px solid var(--border); }
.tb-hero-map .map-coords { font-variant-numeric: tabular-nums; text-align: center; }
.tb-hero-aside {
  display: flex; flex-direction: column; gap: 14px;
}
.tb-hero-aside .section-title { margin-bottom: 6px; }
.tb-hero-aside .cap-badge { margin: 0 3px 3px 0; }
.tb-hero-aside-empty { color: var(--muted); font-size: 12px; font-style: italic; }

/* Indicator labels sit right next to their door on the portrait car */
.tb-car-stage.compact .tb-indicator { min-width: 0; max-width: 110px; }
.tb-car-stage.compact .tb-ind-label { font-size: 9px; }
.tb-car-stage.compact .tb-ind-value { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

@media (max-width: 1100px) {
  .tb-hero-body { grid-template-columns: minmax(0, 1fr); gap: 14px; }
  .tb-car-stage.compact { align-self: center; }
  .tb-hero-body > *:not(:last-child)::after {
    top: auto; bottom: -7px;
    left: 0; right: 0;
    width: auto; height: 1px;
  }
  .tb-hero-map, .tb-hero-aside { padding-top: 14px; }
}

.tb-indicator {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 110px;
  pointer-events: none;
}
/* Left-side indicator: text hugs its right edge (closer to car), dot sits to
   the right of the text so it's visually adjacent to the door it describes. */
.tb-indicator { align-items: flex-end; text-align: right; }
.tb-indicator .tb-ind-value { flex-direction: row-reverse; }
/* Right-side indicator (.right modifier): text left-aligned, dot on the left
   so it sits right next to the door. */
.tb-indicator.right { align-items: flex-start; text-align: left; }
.tb-indicator.right .tb-ind-value { flex-direction: row; }
/* Centred indicator (hatch): dot below the label, centred. */
.tb-indicator.center { align-items: center; text-align: center; }
.tb-indicator.center .tb-ind-value { flex-direction: row; }
.tb-ind-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.tb-ind-value { font-size: 13px; font-weight: 500; color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
.tb-ind-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.tb-ind-dot.warn { background: var(--red); }

/* Battery strip inside hero */
.tb-soc-row {
  display: flex; align-items: center; gap: 20px;
  margin-top: 8px; padding-top: 16px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.tb-soc-big  { font-size: 44px; font-weight: 600; line-height: 1; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
.tb-soc-unit { font-size: 18px; color: var(--muted); font-weight: 500; }
.tb-soc-mid  { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 6px; }
.tb-soc-bar  { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.tb-soc-fill { height: 100%; border-radius: 4px; transition: width .4s; background: var(--primary); }
.tb-soc-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
.tb-soc-stats { display: flex; gap: 20px; margin-left: auto; }
.tb-soc-stat { text-align: right; }
.tb-soc-stat-v { font-size: 18px; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; }
.tb-soc-stat-l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }

/* Remote strip + expander */
.tb-remote {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px;
}
.tb-remote-label {
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  margin-right: 4px; flex-shrink: 0;
}
.tb-remote-btns { display: flex; gap: 8px; flex: 1; }
.tb-remote-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 10px 12px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text); font-family: inherit;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
}
.tb-remote-btn:hover:not(:disabled) { background: var(--hover); border-color: var(--primary); color: var(--primary); }
.tb-remote-btn:disabled { opacity: .35; cursor: not-allowed; }
.tb-remote-more { margin-top: 8px; }
.tb-remote-more summary {
  cursor: pointer; list-style: none;
  font-size: 11px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 4px 2px;
  user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.tb-remote-more summary::-webkit-details-marker { display: none; }
.tb-remote-more[open] summary { color: var(--text); }
.tb-remote-more-body { margin-top: 8px; display: flex; flex-direction: column; gap: 10px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }

/* Route placeholder (used if Leaflet not ready yet) */
.tb-route-ph {
  height: 320px; border-radius: 6px;
  background:
    repeating-linear-gradient(90deg, transparent 0 80px, rgba(0,0,0,.04) 80px 81px),
    repeating-linear-gradient( 0deg, transparent 0 80px, rgba(0,0,0,.04) 80px 81px),
    linear-gradient(135deg, #e7dfd0, #efe7d8);
  position: relative; overflow: hidden;
}

/* Climate toggle pills (seat heaters / defogger / etc.) and temperature slider */
.tb-toggle {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 10px;
  border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
}
.tb-toggle::before {
  content: ''; display: inline-block;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--border);
  transition: background .15s;
}
.tb-toggle:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
.tb-toggle.on { color: var(--text); border-color: var(--green); background: var(--chip-green-bg); }
.tb-toggle.on::before { background: var(--green); }
.tb-toggle:disabled { opacity: .4; cursor: not-allowed; }

.tb-temp-slider {
  display: flex; flex-direction: column; gap: 6px;
  margin: 10px 0 12px;
}
.tb-temp-slider-row { display: flex; align-items: center; gap: 12px; }
.tb-temp-slider-big {
  font-size: 28px; font-weight: 600; line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  min-width: 80px;
}
.tb-temp-slider-big .unit { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 2px; }
.tb-temp-slider input[type=range] {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px;
  background: var(--border);
  outline: none; padding: 0;
  border: none;
}
.tb-temp-slider input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--surface);
  cursor: pointer; box-shadow: 0 0 0 1px var(--border);
}
.tb-temp-slider input[type=range]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--surface);
  cursor: pointer;
}
.tb-temp-slider-scale {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums; letter-spacing: .04em;
}

.tb-climate-group { margin-top: 10px; }
.tb-climate-group-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .04em;
  margin-bottom: 6px;
}
.tb-climate-toggles { display: flex; flex-wrap: wrap; gap: 6px; }

/* Segmented switcher (reserved for future theme/brand toggles) */
.tb-switcher { display: inline-flex; align-items: center; gap: 4px; padding: 3px; background: var(--hover); border-radius: 7px; border: 1px solid var(--border); }
.tb-switcher button { background: transparent; border: none; color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: 500; }
.tb-switcher button.active { background: var(--surface); color: var(--text); box-shadow: 0 0 0 1px var(--border); }
.tb-switcher button:hover:not(.active) { color: var(--text); }

/* Responsive tweaks for hero indicators */
@media (max-width: 720px) {
  .tb-car-stage { min-height: 220px; }
  .tb-car-svg { max-height: 200px; }
  .tb-indicator { min-width: 90px; }
  .tb-ind-value { font-size: 12px; }
  .tb-soc-row { gap: 12px; }
  .tb-soc-big { font-size: 32px; }
  .tb-soc-stats { gap: 14px; }
}
</style>
</head>

<script>
// --- i18n ---
let lang = localStorage.getItem('toybaru_lang') || (() => {
  const bl = navigator.language || 'en';
  if (bl.startsWith('ja')) return 'ja-JP';
  if (bl.startsWith('nl')) return 'nl-NL';
  if (bl === 'fr-CA') return 'fr-CA';
  if (bl.startsWith('fr')) return 'fr-FR';
  if (bl === 'es-MX') return 'es-MX';
  if (bl.startsWith('es')) return 'es-ES';
  if (bl.startsWith('de')) return 'de';
  if (bl === 'en-US' || bl === 'en-us') return 'en-US';
  return 'en';
})();
let i = {};
let LC = 'en-GB'; // browser locale for date/number formatting
let availableLangs = [];
const DEBUG = new URLSearchParams(window.location.search).has('debug');

async function loadI18n() {
  i = await (await fetch(`/api/locale/${lang}`)).json();
  LC = i._meta?.locale || lang;
  applyI18n();
}

function t(path) {
  return path.split('.').reduce((o, k) => o?.[k], i) || path;
}

function tip(label, descKey) {
  const span = document.createElement('span');
  span.className = 'tip';
  span.textContent = label;
  const tipText = document.createElement('span');
  tipText.className = 'tip-text';
  tipText.textContent = t(descKey);
  span.appendChild(tipText);
  return span.outerHTML;
}

function setLang(l) {
  lang = l;
  localStorage.setItem('toybaru_lang', l);
  loadI18n();
}

// --- Auto-sync ---
let _syncInterval = null;

function setAutoSync(minutes) {
  localStorage.setItem('toybaru_autosync', String(minutes));
  if (_syncInterval) { clearInterval(_syncInterval); _syncInterval = null; }
  if (minutes > 0) {
    _syncInterval = setInterval(() => loadOverview(), minutes * 60000);
  }
  document.querySelectorAll('.sync-select').forEach(s => s.value = String(minutes));
}

function initAutoSync() {
  const saved = localStorage.getItem('toybaru_autosync') || '0';
  document.querySelectorAll('.sync-select').forEach(s => s.value = saved);
  setAutoSync(parseInt(saved));
}

// --- Theme ---
let BRAND = 'toyota';

function applyBrand(brand) {
  BRAND = brand;
  document.body.classList.remove('toyota', 'lexus', 'subaru');
  document.body.classList.add(brand);
}

function _setThemeIcon(isDark) {
  document.getElementById('themeBtn').innerHTML = isDark ? icon('sun') : icon('moon');
}
function _setDensityIcon(isDense) {
  const btn = document.getElementById('densityBtn');
  btn.innerHTML = isDense ? icon('density_on') : icon('density');
  btn.title = isDense ? 'Switch to comfort mode' : 'Switch to dense mode';
}

function toggleTheme() {
  // Dark is default; the .light class opts in to the light override.
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('toybaru_theme', isLight ? 'light' : 'dark');
  _setThemeIcon(!isLight);
}

function toggleDensity() {
  const isDense = document.body.classList.toggle('dense');
  localStorage.setItem('toybaru_density', isDense ? 'dense' : 'comfort');
  _setDensityIcon(isDense);
}

function initTheme() {
  const saved = localStorage.getItem('toybaru_theme') || 'dark';
  if (saved === 'light') document.body.classList.add('light');
  else document.body.classList.remove('light');
  _setThemeIcon(saved !== 'light');
  const density = localStorage.getItem('toybaru_density') || 'comfort';
  if (density === 'dense') document.body.classList.add('dense');
  _setDensityIcon(density === 'dense');
}

function updateLangSelects() {
  document.querySelectorAll('.lang-select').forEach(sel => {
    sel.innerHTML = '';
    for (const l of availableLangs) {
      const o = document.createElement('option');
      o.value = l.code; o.textContent = l.label; o.selected = l.code === lang;
      sel.appendChild(o);
    }
  });
}

function applyI18n() {
  updateLangSelects();
  document.querySelectorAll('.sync-select').forEach(sel => {
    const opts = sel.options;
    opts[0].textContent = 'Auto: ' + t('app.sync_off');
    opts[1].textContent = 'Auto: ' + t('app.sync_1min');
    opts[2].textContent = 'Auto: ' + t('app.sync_5min');
    opts[3].textContent = 'Auto: ' + t('app.sync_15min');
    opts[4].textContent = 'Auto: ' + t('app.sync_30min');
    opts[5].textContent = 'Auto: ' + t('app.sync_60min');
  });
  // Login
  document.getElementById('loginSubtitle').textContent = t('login.subtitle');
  document.getElementById('loginEmailLabel').textContent = t('login.email');
  document.getElementById('loginPwLabel').textContent = t('login.password');
  document.getElementById('loginBrandLabel').textContent = t('login.brand');
  document.getElementById('loginRegionLabel').textContent = t('login.region');
  document.getElementById('loginBtn').textContent = t('login.submit');
  // App
  document.getElementById('logoutBtn').textContent = t('app.logout');
  document.getElementById('refreshOverviewBtn').textContent = t('app.refresh');
  document.getElementById('tripsToLabel').textContent = t('import.to').toLowerCase();
  document.getElementById('tripsLoadBtn').textContent = t('trips.load');
  document.getElementById('syncBtn').textContent = t('trips.sync');
  document.getElementById('statsLoading').textContent = t('app.loading');
  document.getElementById('importTitle').textContent = t('import.title');
  document.getElementById('importDesc').textContent = t('import.description');
  document.getElementById('importFromLabel').textContent = t('import.from');
  document.getElementById('importToLabel').textContent = t('import.to');
  document.getElementById('importBtn').textContent = t('import.start');
  updateLogBtn();
  // Tabs
  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = '';
  const tabList = [['nav.vehicle','vehicle']];
  if (HAS_TRIPS) {
    tabList.push(['nav.trips','trips'], ['nav.stats','stats'], ['nav.import','import']);
  }
  for (const [key, id] of tabList) {
    const d = document.createElement('div');
    d.className = 'tab' + (id === 'vehicle' ? ' active' : '');
    d.dataset.tab = id;
    d.textContent = t(key);
    d.onclick = () => switchTab(id);
    tabBar.appendChild(d);
  }
}

// --- Globals ---
let currentVin = null;
let allData = {};
// Climate settings: _climateState is the live edit, _climateStateOrig is the
// last-saved snapshot used to diff and toggle the Apply button.
let _climateState = null;
let _climateStateOrig = null;
let _csrfToken = '';
let UNIT = 'km';  // mirrors bat.evRange.unit
let HAS_TRIPS = true;

function _postHeaders() {
  const h = {'Content-Type': 'application/json'};
  if (_csrfToken) h['X-CSRF-Token'] = _csrfToken;
  return h;
}

function normUnit(u) {
  if (!u) return UNIT;
  const l = String(u).toLowerCase();
  if (l === 'mi' || l === 'mile' || l === 'miles') return 'miles';
  if (l === 'km' || l === 'kilometer' || l === 'kilometers') return 'km';
  return l;
}

// --- Unit labels ---
// Values are never converted — the API already returns them in the account's
// native unit. We only swap the displayed label.
function unitVar(name) {
  const variant = UNIT === 'miles' ? 'imperial' : 'metric';
  const v = t(`units.${name}.${variant}`);
  if (v && !v.startsWith('units.')) return v;
  const fallback = t(`units.${name}.metric`);
  return (fallback && !fallback.startsWith('units.')) ? fallback : null;
}
function distLabel()       { return unitVar('dist')        || 'km'; }
function speedUnit()       { return unitVar('speed')       || 'km/h'; }
function distPer100Label() { return unitVar('consumption') || 'kWh/100km'; }

function tu(key) {
  return t(key).replace(/\{(\w+)\}/g, (m, name) => {
    const v = unitVar(name);
    return v != null ? v : m;
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + id));
  if (id === 'stats') loadStats();
  if (id === 'import') loadDbInfo();
  if (id === 'trips' && !document.querySelector('#tripsTable table')) loadTripsPage();
}

// --- Helpers ---
function hdc(h){if(!h||!h.evDistance&&!h.hdc_ev_distance)return{eco:0,reku:0,power:0};const d=h.evDistance||h.hdc_ev_distance||1;return{eco:Math.round(((h.ecoDist||h.hdc_eco_dist||0)/d)*100),reku:Math.round(((h.chargeDist||h.hdc_charge_dist||0)/d)*100),power:Math.round(((h.powerDist||h.hdc_power_dist||0)/d)*100)}}
function sbarHtml(p){return`<div class="sbar"><div class="sbar-eco" style="width:${p.eco}%"></div><div class="sbar-reku" style="width:${p.reku}%"></div><div class="sbar-power" style="width:${p.power}%"></div></div>`}
function fmtDate(s){return s?new Date(s).toLocaleString(LC,{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'?'}
function fmtKm(m){return m!=null?(m/1000).toFixed(1):'?'}
function scoreClass(s){return s>=80?'score-good':s>=60?'score-mid':'score-bad'}

function _escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function _prettyCap(key){return key.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).replace(/\bCapable\b/g,'').replace(/\s+/g,' ').trim()}

// Lock/Unlock are the only icons in the design system; the rest of these
// resolve to a small Unicode mark or empty string to preserve template spacing.
const GLYPHS = {
  lock: '&#128274;',  // 🔒
  unlock: '&#128275;',// 🔓
  sun: '\u2600',      // ☀
  moon: '\u263E',     // ☾
  density: '\u229E',  // ⊞
  density_on: '\u229F', // ⊟
  check: '\u2713',    // ✓
  warning: '\u26A0',  // ⚠
  hourglass: '\u29D6',// ⧖
};
function icon(name) { return GLYPHS[name] || ''; }

// ---------- Car top-down renderer (ported from design kit CarTopdown.jsx) ----------
function _shadeHex(hex, amount) {
  const h = String(hex || '').replace('#','');
  const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : (h || '000000'), 16) || 0;
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * (1 - amount))));
  g = Math.max(0, Math.min(255, Math.round(g * (1 - amount))));
  b = Math.max(0, Math.min(255, Math.round(b * (1 - amount))));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// Paint-colour catalogue. Subaru/Toyota APIs give us the colour NAME only (e.g.
// "Dark Blue Mica") — no hex. Map the common factory colours so the car
// top-down renders in the vehicle's actual paint.
const PAINT_HEX = {
  'dark blue mica':             '#1c2a44',
  'sapphire blue pearl':        '#1e3960',
  'harbour mist gray metallic': '#838a92',
  'harbor mist gray metallic':  '#838a92',
  'magnetite gray metallic':    '#2c3036',
  'ice silver metallic':        '#c5c9cc',
  'crystal white pearl':        '#eef0f2',
  'crystal black silica':       '#15181a',
  'plasma yellow pearl':        '#e3d34a',
  'autumn green metallic':      '#364a33',
  'sonic copper':               '#8a5a3c',
  'sonic titanium':             '#b7bcc0',
};
function paintForVehicle(v) {
  const name = String(v?.color || '').trim().toLowerCase();
  if (!name) return '#e8e9eb';
  if (PAINT_HEX[name]) return PAINT_HEX[name];
  for (const [k, hex] of Object.entries(PAINT_HEX)) {
    if (name.includes(k)) return hex;
  }
  return '#e8e9eb';
}

function carTopdownSvg(brand, paintHex) {
  // Pass the vehicle's paint colour to the asset endpoint so the server can
  // tint the body fills to match. Bump `v` when the asset itself changes to
  // bust stale browser caches.
  const paint = (paintHex || paintForVehicle(allData?.vehicle || {})).replace('#', '');
  const url = `/assets/car-topdown.svg?paint=${paint}&v=4`;
  // Outer <svg> rotates the landscape asset into portrait. preserveAspectRatio
  // meets the whole illustration inside the slot — no crop, no clipping.
  return `<svg class="tb-car-svg" viewBox="0 0 1568 2658" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="Vehicle top-down">
    <g transform="translate(0 2658) rotate(-90)">
      <image href="${url}" x="0" y="0" width="2658" height="1568"/>
    </g>
  </svg>`;
}

  // EU API uses carstatus_ prefixed keys
  'carstatus_item_driver_door':'status.driver_door','carstatus_item_driver_rear_door':'status.driver_rear_door',
  'carstatus_item_driver_window':'status.driver_window','carstatus_item_driver_rear_window':'status.driver_rear_window',
  'carstatus_item_passenger_door':'status.passenger_door','carstatus_item_passenger_rear_door':'status.passenger_rear_door',
  'carstatus_item_passenger_window':'status.passenger_window','carstatus_item_passenger_rear_window':'status.passenger_rear_window',
  'carstatus_item_rear_hatch':'status.rear_hatch','carstatus_item_hood':'status.hood',
  'carstatus_closed':'status.closed','carstatus_open':'status.open','carstatus_locked':'status.locked','carstatus_unlocked':'status.unlocked',
  'carstatus_category_driver':'status.left','carstatus_category_passenger':'status.right','carstatus_category_other':'status.other',
};
function ts(k){return t(SL[k]||k)}

// --- Auth ---
let brandsData = {};

async function loadBrands() {
  brandsData = await (await fetch('/api/brands')).json();
  const sel = document.getElementById('loginBrand');
  sel.innerHTML = '';
  for (const [key, info] of Object.entries(brandsData)) {
    const o = document.createElement('option');
    o.value = key; o.textContent = info.label;
    sel.appendChild(o);
  }
  updateLoginRegions();
}

function updateLoginRegions() {
  const brand = document.getElementById('loginBrand').value;
  const sel = document.getElementById('loginRegion');
  sel.innerHTML = '';
  const info = brandsData[brand];
  if (!info) return;
  for (const r of info.regions) {
    const o = document.createElement('option');
    o.value = r.key; o.textContent = r.name;
    sel.appendChild(o);
  }
  // Apply brand theme immediately on login screen
  const themeBrand = (brand === 'toyota' || brand === 'toyota-na') ? 'toyota' : 'subaru';
  applyBrand(themeBrand);
}

async function checkAuth() {
  const r = await (await fetch('/api/auth/status')).json();
  if (r.authenticated) {
    if (r.csrf_token) _csrfToken = r.csrf_token;
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    await loadVehicles();
    loadOverview();
    initAutoSync();
  } else {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('appView').style.display = 'none';
  }
}

let _otpSession = '';

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  const otpGroup = document.getElementById('otpGroup');
  btn.disabled = true; btn.textContent = t('login.signing_in'); err.textContent = '';

  // If OTP field is visible, we're in phase 2
  if (otpGroup.style.display !== 'none' && _otpSession) {
    try {
      const res = await fetch('/api/login/otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({otp_session: _otpSession, code: document.getElementById('loginOtp').value}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || t('login.otp_invalid'));
      _csrfToken = data.csrf_token || '';
      document.getElementById('loginPw').value = '';
      document.getElementById('loginOtp').value = '';
      otpGroup.style.display = 'none';
      _otpSession = '';
      await checkAuth();
    } catch(e) {
      err.textContent = t('login.otp_invalid') + ': ' + e.message;
    }
    btn.disabled = false; btn.textContent = t('login.submit');
    return;
  }

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPw').value,
        region: document.getElementById('loginRegion').value,
      }),
    });
    const data = await res.json();
    if (data.needs_otp) {
      _otpSession = data.otp_session;
      otpGroup.style.display = 'block';
      document.getElementById('loginOtpLabel').textContent = t('login.otp_label');
      document.getElementById('otpHint').textContent = t('login.otp_sent');
      document.getElementById('loginOtp').focus();
      btn.disabled = false; btn.textContent = t('login.submit');
      return;
    }
    if (!res.ok) throw new Error(data.error || t('login.failed'));
    _csrfToken = data.csrf_token || '';
    document.getElementById('loginPw').value = '';
    await checkAuth();
  } catch(e) {
    err.textContent = t('login.failed') + ': ' + e.message;
  }
  btn.disabled = false; btn.textContent = t('login.submit');
}

async function doLogout() {
  await fetch('/api/logout', {method:'POST', headers: _postHeaders()});
  _csrfToken = '';
  location.reload();
}

// --- Vehicles ---
async function loadVehicles() {
  const vehicles = await (await fetch('/api/vehicles')).json();
  const sel = document.getElementById('vinSelect');
  sel.innerHTML = '';
  vehicles.forEach(v => {
    const o = document.createElement('option');
    o.value = v.vin; o.textContent = v.alias || v.model_description || v.vin; sel.appendChild(o);
  });
  if (vehicles.length) { currentVin = vehicles[0].vin; sel.value = currentVin; }
  sel.onchange = () => { currentVin = sel.value; loadOverview(); };
}

// --- Overview ---
async function loadOverview() {
  if (!currentVin) return;
  document.getElementById('lastUpdate').textContent = t('app.loading');
  allData = await (await fetch(`/api/all/${currentVin}`)).json();
  if (allData.battery?.evRange?.unit) {
    UNIT = normUnit(allData.battery.evRange.unit);
  }
  const prevHasTrips = HAS_TRIPS;
  if (allData.capabilities) {
    HAS_TRIPS = allData.capabilities.trips !== false;
    // NA accounts (no trips) get US-formatted dates/times.
    if (allData.capabilities.trips === false) LC = 'en-US';
  }
  if (HAS_TRIPS !== prevHasTrips) applyI18n();
  if (allData.brand) {
    applyBrand(allData.brand);
  }
  renderVehicleHero(allData);
  renderEfficiency(allData);
  renderRemote(allData.vehicle?.remote_capabilities, allData.climate_settings, allData.climate_status);
  renderLastTrip();
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString(LC);
}

function _escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// Flatten vehicleStatus = [{ category, sections: [{ section, values }] }] into
// a `category|section` -> values lookup for indicator rendering.
function _buildVehicleStateMap(vehicleStatus) {
  const map = {};
  for (const cat of vehicleStatus || []) {
    for (const sec of cat.sections || []) {
      const vals = (sec.values || []).map(v => String(v.value || '').toLowerCase());
      const key = (String(cat.category || '') + '|' + String(sec.section || '')).toLowerCase();
      map[key] = vals;
    }
  }
  return map;
}
function _stateFor(map, catHas, secHas, secNot) {
  // EU API sections: "carstatus_item_driver_door" is front-left, "..._rear_door"
  // is rear-left — there is no explicit "front" token, hence the substring match.
  const catList = Array.isArray(catHas) ? catHas : [catHas];
  const secList = Array.isArray(secHas) ? secHas : [secHas];
  const secExcl = secNot || [];
  for (const key of Object.keys(map)) {
    const [cat, sec] = key.split('|');
    const catOk = catList.every(x => cat.includes(x));
    const secOk = secList.every(x => sec.includes(x)) && !secExcl.some(x => sec.includes(x));
    if (catOk && secOk) {
      const vals = map[key];
      const warn = vals.some(v => /open|unlocked/.test(v));
      // ts() resolves raw API values like "carstatus_locked" via i18n.
      const label = vals.map(v => ts(v)).join(' \u00b7 ');
      return { label: label || '—', warn };
    }
  }
  return { label: '—', warn: false };
}

// ---------- Vehicle hero (car top-down + indicators + SoC strip) ----------
function renderVehicleHero(all) {
  const el = document.getElementById('vehicleHeroCard');
  const v = all?.vehicle;
  const bat = all?.battery;
  const status = all?.status;
  if (!v || (!v.image && !v.nickname && !v.model_name)) { el.style.display = 'none'; return; }
  el.style.display = '';

  const name = _escHtml(v.nickname || v.model_name || '');
  const modelLine = v.model_year && v.model_name ? _escHtml(v.model_year + ' ' + v.model_name) : _escHtml(v.model_name || '');
  const color = _escHtml(v.color || '');
  const paintHex = paintForVehicle(v);

  const stateMap = _buildVehicleStateMap(status?.vehicleStatus);
  // Front door = has "door", no "rear" / "window". Rear door = has "rear_door".
  const driverFront = _stateFor(stateMap, 'driver',    ['door'],          ['rear', 'window']);
  const driverRear  = _stateFor(stateMap, 'driver',    ['rear', 'door'],  ['window']);
  const passFront   = _stateFor(stateMap, 'passenger', ['door'],          ['rear', 'window']);
  const passRear    = _stateFor(stateMap, 'passenger', ['rear', 'door'],  ['window']);
  const hatch       = _stateFor(stateMap, 'other',     ['hatch'],         []);

  const warnings = Number(status?.cautionOverallCount) || 0;
  const anyUnlocked = [driverFront, driverRear, passFront, passRear, hatch].some(s => s.warn);
  const overallWarn = warnings > 0 || anyUnlocked;
  const statusFetchError = status?.error;
  const overallTag = statusFetchError
    ? `<span class="tag tag-warn" title="${_escHtml(statusFetchError)}">${_escHtml(statusFetchError)}</span>`
    : overallWarn
      ? `<span class="tag tag-warn">${warnings ? warnings + ' ' + _escHtml(t('status.warnings').toLowerCase()) : _escHtml(t('status.open'))}</span>`
      : `<span class="tag tag-ok">${_escHtml(t('status.locked'))}</span>`;

  const pct = Number(bat?.batteryLevel); const pctOk = isFinite(pct);
  const range = Number(bat?.evRange?.value); const rangeOk = isFinite(range);
  const rangeAc = Number(bat?.evRangeWithAc?.value); const rangeAcOk = isFinite(rangeAc);
  const unit = _escHtml(bat?.evRange?.unit || UNIT || 'km');
  const cs = String(bat?.chargingStatus || '');
  const batColor = pctOk && pct > 50 ? 'var(--green)' : pctOk && pct > 20 ? 'var(--yellow)' : 'var(--red)';

  function indicator(side, pos, label, state) {
    return `<div class="tb-indicator ${side}" style="${pos}">
      <span class="tb-ind-label">${_escHtml(label)}</span>
      <span class="tb-ind-value"><span class="tb-ind-dot ${state.warn ? 'warn' : ''}"></span>${_escHtml(state.label)}</span>
    </div>`;
  }

  const carHtml = carTopdownSvg(BRAND, paintHex);

  let socHtml = '';
  if (pctOk || rangeOk) {
    socHtml = `<div class="tb-soc-row">
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="tb-soc-big" style="color:${batColor}">${pctOk ? pct : '?'}</span><span class="tb-soc-unit">%</span>
      </div>
      <div class="tb-soc-mid">
        <div class="tb-soc-bar"><div class="tb-soc-fill" style="width:${pctOk ? pct : 0}%;background:${batColor}"></div></div>
        <div class="tb-soc-meta">
          <span>${cs === 'charging' ? _escHtml(t('battery.charging')) : cs === 'connected' ? _escHtml(t('battery.connected')) : _escHtml(t('battery.not_charging'))}</span>
          <span>${bat?.lastUpdateTimestamp ? fmtDate(bat.lastUpdateTimestamp) : ''}</span>
        </div>
      </div>
      <div class="tb-soc-stats">
        <div class="tb-soc-stat">
          <div class="tb-soc-stat-v">${rangeOk ? Math.round(range) + ' ' + unit : '—'}</div>
          <div class="tb-soc-stat-l">${_escHtml(t('battery.range'))}</div>
        </div>
        <div class="tb-soc-stat">
          <div class="tb-soc-stat-v">${rangeAcOk ? Math.round(rangeAc) + ' ' + unit : '—'}</div>
          <div class="tb-soc-stat-l">${_escHtml(t('battery.range_ac'))}</div>
        </div>
      </div>
    </div>`;
  }

  let chargeDetail = '';
  if (cs === 'charging' && bat?.remainingChargeTime) {
    const rt = bat.remainingChargeTime;
    const kw = ((100 - (pctOk ? pct : 0)) / 100 * 71.4 / (rt / 60));

function _renderHeroMap(all) {
  const locData = all?.location;
  const loc = locData && !locData.error ? (locData.vehicleLocation || locData) : null;
  const lat = loc?.latitude, lon = loc?.longitude;
  const locTs = loc?.locationAcquisitionDatetime || locData?.lastTimestamp;
  if (!lat || !lon) {
    return `<div class="tb-hero-map">
      <div class="section-title">${_escHtml(t('location.title'))}</div>
      <div class="meta" style="flex:1 1 auto;display:flex;align-items:center;justify-content:center">${_escHtml(t('location.unavailable'))}</div>
    </div>`;
  }
  let agoTag = '';
  if (locTs) {
    const ago = Math.round((Date.now() - new Date(locTs).getTime()) / 60000);
    const agoLabel = ago < 1 ? 'just now' : ago < 60 ? ago + 'm ago' : Math.round(ago / 60) + 'h ago';
    const stale = ago > 60;
    agoTag = `<span class="tag ${stale ? 'tag-warn' : 'tag-ok'}" style="font-size:10px">${_escHtml(agoLabel)}</span>`;
  }
  return `<div class="tb-hero-map">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span>${_escHtml(t('location.title'))}</span>
      ${agoTag}
    </div>
    <iframe sandbox="allow-scripts allow-same-origin" loading="lazy"
            src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-.004},${lat-.002},${lon+.004},${lat+.002}&layer=mapnik&marker=${lat},${lon}"></iframe>
    <div class="meta map-coords">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>
  </div>`;

function _renderHeroAside(all) {
  const v = all?.vehicle || {};
  const bat = all?.battery || {};
  const sections = [];

  if (Array.isArray(v.features) && v.features.length) {
    const badges = v.features.map(k => `<span class="cap-badge">${_escHtml(_prettyCap(k))}</span>`).join('');
    sections.push(`<div><div class="section-title">${_escHtml(t('hero.features').replace('{n}', v.features.length))}</div><div>${badges}</div></div>`);
  }

  if (Array.isArray(v.subscriptions) && v.subscriptions.length) {
    const rows = v.subscriptions.map(s => {
      const days = s.daysRemaining || 0;
      const urgency = days < 90 ? 'var(--red)' : days < 365 ? 'var(--yellow)' : 'var(--green)';
      const endFmt = s.endDate ? new Date(s.endDate + 'T00:00:00').toLocaleDateString(LC, { year: '2-digit', month: 'short' }) : '?';
      return `<div class="row" style="padding:2px 0"><span class="k">${_escHtml(s.name)}</span><span><span style="color:${urgency}">${_escHtml(s.type || s.status)}</span> &middot; ${endFmt}</span></div>`;
    }).join('');
    sections.push(`<div><div class="section-title">${_escHtml(t('hero.subscriptions'))}</div>${rows}</div>`);
  }

  const solar = bat.solar;
  if (solar && (solar.equipped != null || solar.cumulativeDistance != null)) {
    const status = solar.equipped ? _escHtml(t('hero.solar_panel')) : _escHtml(t('hero.solar_na'));
    const extra = solar.cumulativeDistance ? ` <span class="meta">· ${Math.round(solar.cumulativeDistance)} ${distLabel()}</span>` : '';
    sections.push(`<div><div class="section-title">Equipment</div><div class="row" style="padding:2px 0"><span class="k">Solar</span><span>${status}${extra}</span></div></div>`);
  }

  const hasDetails = v.head_unit?.description || v.dcm?.supplier || v.katashiki_code || v.family_sharing != null;
  if (hasDetails) {
    let rows = '';
    if (v.head_unit?.description)
      rows += `<div class="row" style="padding:2px 0"><span class="k">${_escHtml(t('hero.head_unit'))}</span><span>${_escHtml(v.head_unit.description)}</span></div>`;
    if (v.dcm?.supplier)
      rows += `<div class="row" style="padding:2px 0"><span class="k">${_escHtml(t('hero.telematics'))}</span><span>${_escHtml(v.dcm.supplier)}</span></div>`;
    if (v.katashiki_code)
      rows += `<div class="row" style="padding:2px 0"><span class="k">${_escHtml(t('hero.katashiki'))}</span><span style="font-family:'SF Mono',monospace;font-size:11px">${_escHtml(v.katashiki_code)}</span></div>`;
    if (v.family_sharing != null)
      rows += `<div class="row" style="padding:2px 0"><span class="k">${_escHtml(t('hero.family_sharing'))}</span><span>${v.family_sharing ? _escHtml(t('hero.enabled')) : _escHtml(t('hero.disabled'))}</span></div>`;
    sections.push(`<div><div class="section-title">${_escHtml(t('hero.vehicle_details'))}</div>${rows}</div>`);
  }

  const body = sections.length ? sections.join('') : `<div class="tb-hero-aside-empty">${_escHtml(t('status.no_additional'))}</div>`;
  return `<div class="tb-hero-aside">${body}</div>`;
}

async function refreshBattery() {
  if(!currentVin)return;
  const btn=document.getElementById('batRefreshBtn');const st=document.getElementById('batRefreshStatus');
  btn.disabled=true;btn.style.opacity='.6';btn.textContent='...';
  try{
    const resp = await fetch(`/api/refresh/${currentVin}`,{method:'POST',headers:_postHeaders()});
    if (resp.status === 429) {
      const msg = await resp.json().catch(() => ({detail:'Rate limited'}));
      st.innerHTML = icon('warning', 11) + ' ' + _escHtml(msg.detail || 'Rate limited');
      btn.disabled=false;btn.textContent=t('battery.refresh_btn');btn.style.opacity='1';
      return;
    }
    st.innerHTML = icon('hourglass', 11) + ' Waking vehicle...';

    const originalPct = allData?.battery?.batteryLevel;
    const originalTs = allData?.battery?.lastUpdateTimestamp;
    let attempts = 0;
    const maxAttempts = 8;
    const interval = 10000;

    function showStatus(msg) {
      const el = document.getElementById('batRefreshStatus');
      if (el) el.innerHTML = msg;
    }
    function resetBtn() {
      const b = document.getElementById('batRefreshBtn');
      if (b) { b.disabled=false; b.textContent=t('battery.refresh_btn'); b.style.opacity='1'; }
    }
    function fmtTs(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString(LC, {hour:'2-digit',minute:'2-digit'});
    }

    const poll = async () => {
      attempts++;
      showStatus(icon('hourglass', 11) + ` Waiting (${attempts}/${maxAttempts})...`);
      const b = document.getElementById('batRefreshBtn');
      if (b) b.textContent = `${attempts}/${maxAttempts}`;
      try {
        const c = await (await fetch(`/api/battery/${currentVin}`)).json();
        if (c && !c.error) {
          const newTs = c.lastUpdateTimestamp;
          const newPct = c.batteryLevel;
          if ((newTs && newTs !== originalTs) || (newPct != null && newPct !== originalPct)) {
            allData.battery = c;
            renderBattery(c, allData);
            renderVehicleHero(allData.vehicle, c.solar, c, allData.status);
            showStatus(icon('check', 11) + ` ${newPct}% · Updated ${fmtTs(newTs)}`);
            resetBtn();
            return;
          }
        }
      } catch(e) { /* keep trying */ }

      if (attempts < maxAttempts) {
        setTimeout(poll, interval);
      } else {
        showStatus(icon('hourglass', 11) + ' Final refresh...');
        await loadOverview();
        const finalPct = allData?.battery?.batteryLevel;
        const finalTs = allData?.battery?.lastUpdateTimestamp;
        if (finalPct != null && finalPct !== originalPct) {
          showStatus(icon('check', 11) + ` ${finalPct}% · Updated ${fmtTs(finalTs)}`);
        } else {
          showStatus(icon('warning', 11) + ` No change yet · Last: ${fmtTs(finalTs || originalTs)}`);
        }
        resetBtn();
      }
    };
    setTimeout(poll, interval);
  }catch(e){
    const el=document.getElementById('batRefreshStatus');
    if(el) el.textContent=t('app.error')+': '+e.message;
    const b=document.getElementById('batRefreshBtn');
    if(b){b.disabled=false;b.textContent=t('battery.refresh_btn');b.style.opacity='1'}
  }
}

function renderRemote(remoteCaps, climateSettings, climateStatus) {
  const el=document.getElementById('remoteCard');
  const rc = remoteCaps || {};
  // Backend returns {_unavailable: "climate_settings"} on platforms that don't
  // expose the endpoint. Treat that as "no data" so we skip the empty panel.
  const cs = climateSettings && !climateSettings.error && !climateSettings._unavailable ? climateSettings : null;
  const cst = climateStatus && !climateStatus.error && !climateStatus._unavailable ? climateStatus : null;

  // Capability map — command -> boolean/undefined. undefined means "assume capable"
  const capMap = {
    'door-lock': rc.dlockUnlockCapable,
    'door-unlock': rc.dlockUnlockCapable,
    'trunk-lock': rc.trunkCapable || rc.trunkCommandCapable,
    'trunk-unlock': rc.trunkCapable || rc.trunkCommandCapable,
    'headlight-on': rc.headLightCapable || rc.headlightCommandCapable,
    'headlight-off': rc.headLightCapable || rc.headlightCommandCapable,
    'hazard-on': rc.hazardCapable,
    'hazard-off': rc.hazardCapable,
    'sound-horn': rc.hornCommandCapable,
    'buzzer-warning': rc.hornCommandCapable,
    'engine-start': rc.estartEnabled,
    'engine-stop': rc.estopEnabled,
    'find-vehicle': rc.vehicleFinderCapable,
  };

  function primaryBtn(cmd, label, glyph) {
    const disabled = capMap[cmd] === false;
    const disAttr = disabled ? 'disabled' : '';
    const g = icon(glyph);
    return `<button class="tb-remote-btn" data-cmd="${_escAttr(cmd)}" ${disAttr} title="${_escAttr(label)}">${g ? g + ' ' : ''}${_escHtml(label)}</button>`;
  }
  function secondaryBtn(cmd, label, variant) {
    const disabled = capMap[cmd] === false;
    const disAttr = disabled ? 'disabled' : '';
    let cls = 'btn btn-sm';
    if (variant === 'destructive') cls += ' btn-destructive';
    return `<button class="${cls}" data-cmd="${_escAttr(cmd)}" ${disAttr} title="${_escAttr(label)}">${_escHtml(label)}</button>`;
  }

  let h = `<div class="tb-remote">
    <div class="tb-remote-label">${_escHtml(t('remote.title'))}</div>
    <div class="tb-remote-btns">
      ${primaryBtn('door-lock',   t('remote.lock'),         'lock')}
      ${primaryBtn('door-unlock', t('remote.unlock'),       'unlock')}
      ${primaryBtn('sound-horn',  t('remote.horn'),         '')}
      ${primaryBtn('headlight-on',t('remote.headlight_on'), '')}
    </div>
    <span class="meta" id="remoteStatus" style="margin-left:4px;white-space:nowrap;min-width:90px;text-align:right"></span>
  </div>
  <details class="tb-remote-more">
    <summary>${_escHtml(t('remote.more') || 'More commands')}</summary>
    <div class="tb-remote-more-body">
      <div>
        <div class="meta" style="margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${_escHtml(t('remote.group_hatch'))}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${secondaryBtn('trunk-lock',   t('remote.hatch_lock'))}
          ${secondaryBtn('trunk-unlock', t('remote.hatch_unlock'))}
        </div>
      </div>
      <div>
        <div class="meta" style="margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${_escHtml(t('remote.group_lights'))} / ${_escHtml(t('remote.group_find'))}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${secondaryBtn('headlight-off', t('remote.headlight_off'))}
          ${secondaryBtn('find-vehicle',  t('remote.find_vehicle'))}
        </div>
      </div>
      <div>
        <div class="meta" style="margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${_escHtml(t('remote.group_engine'))}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${secondaryBtn('engine-start', t('remote.engine_start'))}
          ${secondaryBtn('engine-stop',  t('remote.engine_stop'))}
        </div>
      </div>
      <div>
        <div class="meta" style="margin-bottom:6px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.04em">${_escHtml(t('remote.group_horn'))} / ${_escHtml(t('remote.alerts'))}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${secondaryBtn('hazard-on',     t('remote.hazard_on'), 'destructive')}
          ${secondaryBtn('hazard-off',    t('remote.hazard_off'))}
          ${secondaryBtn('buzzer-warning',t('remote.buzzer'))}
        </div>
      </div>
    </div>
  </details>`;

  if (cs || cst) {
    // Stage edits in _climateState; nothing is sent until the user clicks Apply.
    _climateState = cs ? JSON.parse(JSON.stringify(cs)) : null;
    _climateStateOrig = cs ? JSON.parse(JSON.stringify(cs)) : null;

    const running = !!(cst && cst.status);
    const unit = cs?.temperatureUnit || 'F';
    const targetTemp = cs?.temperature ?? cst?.targetTemperature?.value;
    const currentTemp = cst?.currentTemperature?.value;
    const duration = cst?.duration;
    const startedAt = cst?.startedAt;
    const minT = cs?.minTemp;
    const maxT = cs?.maxTemp;
    const interval = cs?.tempInterval || 1;
    const statusTag = running
      ? `<span class="tag tag-ok">${_escHtml(t('remote.climate_running'))}</span>`
      : `<span class="tag" style="background:transparent;color:var(--muted);border-color:var(--border)">${_escHtml(t('remote.climate_off'))}</span>`;

    h+=`<div class="card" style="margin-top:8px">
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span>${_escHtml(t('remote.climate_title'))}</span>${statusTag}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <button class="btn btn-primary" data-climate="start" ${running ? 'disabled' : ''}>${_escHtml(t('remote.climate_start'))}</button>
        <button class="btn btn-destructive" data-climate="stop" ${running ? '' : 'disabled'}>${_escHtml(t('remote.climate_stop'))}</button>
        <button class="btn btn-sm" data-climate="refresh" style="margin-left:auto">${_escHtml(t('app.refresh'))}</button>
      </div>`;

    if (cs && minT != null && maxT != null && targetTemp != null) {
      h+=`<div class="tb-temp-slider">
        <div class="tb-temp-slider-row">
          <div class="tb-temp-slider-big"><span id="climateTempVal">${targetTemp}</span><span class="unit">\u00B0${_escHtml(unit)}</span></div>
          <input type="range" id="climateTempSlider" min="${minT}" max="${maxT}" step="${interval}" value="${targetTemp}">
        </div>
        <div class="tb-temp-slider-scale"><span>${minT}\u00B0</span><span>${maxT}\u00B0</span></div>
      </div>`;
    }

    if (running && currentTemp != null) {
      h+=`<div class="row"><span class="k">${_escHtml(t('remote.current_temp'))}</span><span>${currentTemp}\u00B0${unit}</span></div>`;
    }
    if (running && duration != null) {
      h+=`<div class="row"><span class="k">${_escHtml(t('remote.duration'))}</span><span>${duration} min</span></div>`;
    }
    if (running && startedAt) {
      h+=`<div class="row"><span class="k">${_escHtml(t('remote.started_at'))}</span><span>${fmtDate(startedAt)}</span></div>`;
    }

    const ops = cs?.acOperations || [];
    const availOps = ops.filter(o => o.available);
    for (let i = 0; i < availOps.length; i++) {
      const op = availOps[i];
      const params = (op.acParameters || []).filter(p => p.available);
      if (!params.length) continue;
      const opIdx = ops.indexOf(op);  // original index into full acOperations array
      h+=`<div class="tb-climate-group">
        <div class="tb-climate-group-title">${_escHtml(op.categoryDisplayName || op.category || op.categoryName || '—')}</div>
        <div class="tb-climate-toggles">`;
      for (const p of params) {
        const pIdx = op.acParameters.indexOf(p);
        h+=`<button type="button" class="tb-toggle ${p.enabled ? 'on' : ''}" data-op-idx="${opIdx}" data-param-idx="${pIdx}">${_escHtml(p.displayName || p.name)}</button>`;
      }
      h+=`</div></div>`;
    }

    if (cs) {
      h+=`<div style="display:flex;gap:8px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn btn-primary" id="climateApplyBtn" data-climate-apply disabled>${_escHtml(t('remote.apply'))}</button>
        <button class="btn btn-sm" id="climateRevertBtn" data-climate-revert disabled>${_escHtml(t('remote.revert'))}</button>
        <span class="meta" id="climateStatus" style="margin-left:auto;min-height:14px"></span>
      </div>`;
    } else {
      h+=`<div class="meta" id="climateStatus" style="margin-top:8px;min-height:14px"></div>`;
    }
    h+=`</div>`;
  }

  el.innerHTML=h;

  // cloneNode strips previous listeners; rebind on the fresh root.
  const fresh = el.cloneNode(true);
  el.parentNode.replaceChild(fresh, el);
  fresh.addEventListener('click', function(e) {
    const cmdBtn = e.target.closest('[data-cmd]');
    if (cmdBtn) { sendCommand(cmdBtn.dataset.cmd); return; }
    const climateBtn = e.target.closest('[data-climate]');
    if (climateBtn) { sendClimate(climateBtn.dataset.climate); return; }
    if (e.target.closest('[data-climate-apply]')) { applyClimateSettings(); return; }
    if (e.target.closest('[data-climate-revert]')) { revertClimateSettings(); return; }
    const toggle = e.target.closest('[data-op-idx]');
    if (toggle) {
      const opIdx = parseInt(toggle.dataset.opIdx, 10);
      const pIdx = parseInt(toggle.dataset.paramIdx, 10);
      if (_climateState?.acOperations?.[opIdx]?.acParameters?.[pIdx]) {
        _climateState.acOperations[opIdx].acParameters[pIdx].enabled = !toggle.classList.contains('on');
        toggle.classList.toggle('on');

  });

  if (slider) {

    slider.addEventListener('change', () => {
      if (_climateState) _climateState.temperature = parseFloat(slider.value);
      _climateMarkDirty();
    });
  }
}

// Enable Apply / Revert iff staged state differs from last-saved snapshot.
function _climateMarkDirty() {
  const dirty = _climateState && _climateStateOrig
    && JSON.stringify(_climateState) !== JSON.stringify(_climateStateOrig);
  const apply = document.getElementById('climateApplyBtn');
  const revert = document.getElementById('climateRevertBtn');
  if (apply) apply.disabled = !dirty;
  if (revert) revert.disabled = !dirty;
  const statusEl = document.getElementById('climateStatus');
  if (statusEl && dirty) statusEl.textContent = t('remote.unsaved');
}

async function applyClimateSettings() {
  if (!currentVin || !_climateState) return;
  const statusEl = document.getElementById('climateStatus');
  const apply = document.getElementById('climateApplyBtn');
  if (apply) apply.disabled = true;
  if (statusEl) statusEl.textContent = t('app.loading');
  try {
    const r = await fetch(`/api/climate-settings/${currentVin}`, {
      method: 'PUT',
      headers: _postHeaders(),
      body: JSON.stringify(_climateState),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.error) {
      if (statusEl) statusEl.textContent = _escHtml(j.error || `HTTP ${r.status}`);
      if (apply) apply.disabled = false;
      return;
    }
    if (statusEl) statusEl.textContent = t('remote.sent');
    _climateStateOrig = JSON.parse(JSON.stringify(_climateState));
    _climateMarkDirty();
  } catch (e) {
    if (statusEl) statusEl.textContent = _escHtml(e.message || 'Error');
    if (apply) apply.disabled = false;
  }
}

function revertClimateSettings() {
  if (!_climateStateOrig) return;
  _climateState = JSON.parse(JSON.stringify(_climateStateOrig));
  renderRemote(allData.vehicle?.remote_capabilities, _climateState, allData.climate_status);
}

async function sendClimate(action) {
  if (!currentVin) return;
  const statusEl = document.getElementById('climateStatus');
  function show(msg) { if (statusEl) statusEl.textContent = msg; }
  try {
    if (action === 'refresh') {
      show(t('app.loading'));
      await fetch(`/api/climate-refresh/${currentVin}`, { method: 'POST', headers: _postHeaders() });
      await loadOverview();
      show('');
      return;
    }
    if (!confirm(t('remote.confirm'))) return;
    show(t('app.loading'));
    const r = await fetch(`/api/climate/${currentVin}/${action}`, { method: 'POST', headers: _postHeaders() });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.error) {
      show(_escHtml(j.error || `HTTP ${r.status}`));
      return;
    }
    show(t('remote.sent'));
    // Poll-once after a short delay so the fresh status reflects the change.
    setTimeout(() => loadOverview(), 4000);
  } catch (e) {
    show(_escHtml(e.message || 'Error'));
  }
}

async function sendCommand(cmd) {
  if(!currentVin)return;
  if(!confirm(t('remote.confirm')))return;
  const st=document.getElementById('remoteStatus');
  st.textContent='...';
  try{
    const r=await(await fetch(`/api/command/${currentVin}/${cmd}`,{method:'POST',headers:_postHeaders()})).json();
    if(r.error)st.textContent=t('app.error')+': '+r.error;
    else st.textContent=t('remote.sent');
  }catch(e){st.textContent=t('app.error')+': '+e.message}
}

async function loadTripsPage() {

async function syncTrips() {
  if(!currentVin)return;const btn=document.getElementById('syncBtn');const meta=document.getElementById('tripsMeta');
  btn.disabled=true;btn.style.opacity='.6';btn.textContent=t('trips.syncing');

  let h=`<div class="trips-wrap"><table><thead><tr>

    const d2=r.start_ts?new Date(r.start_ts):null;
    const dateStr=d2?d2.toLocaleDateString(LC,{weekday:'short',day:'2-digit',month:'short'}):'?';
    const timeStr=d2?d2.toLocaleTimeString(LC,{hour:'2-digit',minute:'2-digit'}):'';
    h+=`<tr class="clickable-row" data-trip-id="${_escAttr(r.id)}">`;
    h+=`<td><span class="trip-date">${dateStr}</span><br><span class="meta">${timeStr}</span></td>`;
    h+=`<td class="num"><b>${fmtKm(r.length_m)}</b> <span class="meta">${distLabel()}</span></td>`;
    h+=`<td class="num">${r.duration_s?Math.round(r.duration_s/60):'?'} <span class="meta">min</span></td>`;
    h+=`<td class="num">${r.avg_speed?Math.round(r.avg_speed):'?'} <span class="meta">/ ${r.max_speed?Math.round(r.max_speed):'?'}</span></td>`;
    h+=`<td class="num"><span class="trip-score ${scoreClass(sc)}">${sc??'?'}</span></td>`;
    h+=`<td style="min-width:140px">${sbarHtml(p)}<div class="trip-pct"><b>${p.eco}</b> eco &middot; <b>${p.reku}</b> reku &middot; <b>${p.power}</b> pwr</div>`;
    if(badB||badA)h+=`<div style="font-size:11px;color:var(--red);margin-top:1px">${badB?badB+' '+t('trips.braking_events'):''} ${badA?badA+' '+t('trips.accel_events'):''}</div>`;
    h+=`</td>`;
    if(DEBUG)h+=`<td class="num">${r.est_kwh_100km??'?'}</td>`;
    h+=`</tr>`;
  }
  h+='</tbody></table></div>';document.getElementById('tripsTable').innerHTML=h;
  document.getElementById('tripsTable').addEventListener('click', function(e) {
    const row = e.target.closest('[data-trip-id]');
    if (row) showTrip(row.dataset.tripId);

}
